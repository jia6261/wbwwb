name: Build and Release MHTML (Master Branch)

on:
  push:
    branches: [ master ] # 明确指定为 master 分支
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Inliner
        run: npm install -g inliner

      - name: Bundle Project
        run: |
          # 执行内联打包
          # inliner 会尝试抓取 index.html 中引用的所有 css/js/images/sounds
          inliner index.html > Persian-Project-Offline.mhtml

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=Master-Build-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Master Branch Auto-Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ### 📦 项目单文件版本 (MHTML)
            这是从 `master` 分支自动构建的单文件版。
            - **包含资源**：HTML, CSS, JS, Sprites, Sounds.
            - **使用方法**：下载后直接用 Chrome 或 Edge 浏览器打开即可。
          files: Persian-Project-Offline.mhtml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
